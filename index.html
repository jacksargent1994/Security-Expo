// ─── ICS ─────────────────────────────────────────────────────────────────────
function generateICS(b) {
  const day = DAYS.find(d => d.label === b.day);
  if (!day) return null;
  const s = b.time.split('-')[0], e = b.time.split('-')[1];
  const [y,mo,d] = day.iso.split('-');
  const dtS = `${y}${mo}${d}T${s.slice(0,2)}${s.slice(2,4)}00`;
  const dtE = `${y}${mo}${d}T${e.slice(0,2)}${e.slice(2,4)}00`;
  const now = new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const uid = `${Date.now()}-${Math.random().toString(36).slice(2)}@expo`;
  const names = b.staff.split(/[\/,+&]/).map(x=>x.trim()).filter(Boolean);
  const att = names.map(n=>`ATTENDEE;CN="${n}";ROLE=REQ-PARTICIPANT:mailto:${n.toLowerCase().replace(/\s+/g,'.')}@company.com`).join('\r\n');
  const desc = [`Pod: ${b.pod}`,`Representatives: ${b.representatives||'TBC'}`,
    b.challenge?`Challenge: ${b.challenge}`:'', b.solution?`Solution: ${b.solution}`:'',
    b.technology?`Technology: ${b.technology}`:'', b.crm_link?`CRM: ${b.crm_link}`:'',
  ].filter(Boolean).join('\\n');
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Security Expo Booking//EN','METHOD:REQUEST',
    'BEGIN:VEVENT',`UID:${uid}`,`DTSTAMP:${now}`,
    `DTSTART;TZID=Australia/Sydney:${dtS}`,`DTEND;TZID=Australia/Sydney:${dtE}`,
    `SUMMARY:${b.organisation} – ${b.pod}`,`DESCRIPTION:${desc}`,
    `LOCATION:${b.pod} – ${SHOW_NAME}`,att,'STATUS:CONFIRMED','SEQUENCE:0',
    'BEGIN:VALARM','TRIGGER:-PT15M','ACTION:DISPLAY','DESCRIPTION:Meeting in 15 min','END:VALARM',
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
}
function dlICS(b) {
  const ics = generateICS(b); if (!ics) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ics],{type:'text/calendar;charset=utf-8'}));
  a.download = `${b.organisation.replace(/[^a-z0-9]/gi,'_')}_${b.time}.ics`;
  a.click();
}
function dlAllICS(list) { list.filter(b=>b.organisation).forEach((b,i)=>setTimeout(()=>dlICS(b),i*150)); }

function exportExcel(bookings) {
  // Sort by day then pod then time
  const dayOrder = {'Day One':0,'Day Two':1,'Day Three':2};
  const sorted = [...bookings]
    .filter(b => b.organisation)
    .sort((a,b) => (dayOrder[a.day]||0)-(dayOrder[b.day]||0) || a.pod.localeCompare(b.pod) || a.time.localeCompare(b.time));

  const rows = sorted.map(b => ({
    'Day':              b.day,
    'Date':             b.day === 'Day One' ? 'Wed 27 Aug' : b.day === 'Day Two' ? 'Thu 28 Aug' : 'Fri 29 Aug',
    'Time':             b.time,
    'Pod':              b.pod,
    'Staff':            b.staff,
    'Organisation':     b.organisation,
    'Representatives':  b.representatives || '',
    'Challenge':        b.challenge || '',
    'Solution':         b.solution || '',
    'Technology':       b.technology || '',
    'CRM Link':         b.crm_link || '',
    'Calendar Invite':  b.calendar_invite ? 'Yes' : 'No',
  }));

  const wb = XLSX.utils.book_new();

  // Sheet 1 — All bookings
  const wsAll = XLSX.utils.json_to_sheet(rows);
  wsAll['!cols'] = [
    {wch:10},{wch:12},{wch:12},{wch:20},{wch:25},{wch:28},
    {wch:28},{wch:35},{wch:25},{wch:30},{wch:25},{wch:16},
  ];
  XLSX.utils.book_append_sheet(wb, wsAll, 'All Bookings');

  // Sheet per day
  ['Day One','Day Two','Day Three'].forEach(day => {
    const dayRows = rows.filter(r => r['Day'] === day);
    if (!dayRows.length) return;
    const ws = XLSX.utils.json_to_sheet(dayRows);
    ws['!cols'] = [{wch:10},{wch:12},{wch:12},{wch:20},{wch:25},{wch:28},{wch:28},{wch:35},{wch:25},{wch:30},{wch:25},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws, day);
  });

  XLSX.writeFile(wb, 'SYXC_Security_Expo_2026_Bookings.xlsx');
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function Modal({init, onClose, onSave, onDelete, bookings}) {
  const [f, setF] = React.useState(init);
  const [errs, setErrs] = React.useState({});
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const clash = bookings.find(b =>
    b.pod === f.pod && b.day === f.day && b.time === f.time && b.id !== f.id
  );
  const validate = () => {
    const e={};
    if(!f.organisation.trim()) e.organisation='Required';
    if(!f.staff.trim()) e.staff='Required';
    setErrs(e); return !Object.keys(e).length;
  };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',display:'flex',
      alignItems:'center',justifyContent:'center',zIndex:1000,backdropFilter:'blur(4px)',padding:16}}>
      <div style={{background:'#fff',border:`1px solid ${C.border2}`,borderRadius:14,
        width:'min(660px,100%)',maxHeight:'92vh',overflowY:'auto',padding:32,position:'relative'}}>
        <button onClick={onClose} style={{position:'absolute',top:14,right:14,background:'none',
          border:'none',color:C.muted,fontSize:22,cursor:'pointer',lineHeight:1}}>✕</button>
        <h2 style={{margin:'0 0 22px',fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,color:C.text,fontWeight:700}}>
          {f.id ? 'Edit Booking' : 'New Booking'}
        </h2>
        {clash && (
          <div style={{background:'#fff3cd',border:'1px solid #ffc107',borderRadius:8,
            padding:'10px 14px',marginBottom:16,fontSize:13,color:'#856404',display:'flex',alignItems:'center',gap:8}}>
            ⚠ <span><strong>{clash.organisation}</strong> is already booked in this pod at this time — choose a different slot.</span>
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          {[
            {label:'Pod / Room',span:1,el:<select value={f.pod} onChange={e=>set('pod',e.target.value)} style={inp}>{PODS.map(p=><option key={p}>{p}</option>)}</select>},
            {label:'Day',span:1,el:<select value={f.day} onChange={e=>set('day',e.target.value)} style={inp}>{DAYS.map(d=><option key={d.label} value={d.label}>{d.label} – {d.date}</option>)}</select>},
            {label:'Time Slot',span:1,el:<select value={f.time} onChange={e=>set('time',e.target.value)} style={inp}>{TIME_SLOTS.filter(t=>t!==LUNCH_SLOT).map(t=><option key={t}>{t}</option>)}</select>},
            {label:'Calendar Invite Sent?',span:1,el:<select value={f.calendar_invite?'yes':'no'} onChange={e=>set('calendar_invite',e.target.value==='yes')} style={inp}><option value="no">No</option><option value="yes">Yes</option></select>},
          ].map(({label,span,el})=>(
            <div key={label} style={{gridColumn:`span ${span}`,display:'flex',flexDirection:'column',gap:5}}>
              <label style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em'}}>{label}</label>
              {el}
            </div>
          ))}
          {[
            {label:'Staff Assigned',  key:'staff',          ph:'e.g. Rob / Jack / Sarah',      err:errs.staff,        span:2},
            {label:'Organisation',    key:'organisation',   ph:'Company name',                 err:errs.organisation, span:2},
            {label:'Representatives', key:'representatives',ph:'Visitor names',                span:2},
            {label:'Challenge',       key:'challenge',      ph:'What problem are they solving?',span:2,multi:true},
            {label:'Solution',        key:'solution',       ph:'Proposed solution',             span:1},
            {label:'Technology',      key:'technology',     ph:'e.g. SC SaaS, Cloudrunner',     span:1},
            {label:'CRM Link',        key:'crm_link',       ph:'Dynamics 365 link or note',     span:2},
          ].map(({label,key,ph,err,span,multi})=>(
            <div key={key} style={{gridColumn:`span ${span}`,display:'flex',flexDirection:'column',gap:5}}>
              <label style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em'}}>{label}</label>
              {multi
                ? <textarea value={f[key]} onChange={e=>set(key,e.target.value)} placeholder={ph} rows={2} style={{...inp,resize:'vertical',lineHeight:1.5}}/>
                : <input value={f[key]} onChange={e=>set(key,e.target.value)} placeholder={ph} style={{...inp,...(err?{borderColor:C.red}:{})}}/>}
              {err && <span style={{color:C.red,fontSize:11}}>{err}</span>}
            </div>
          ))}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:22,gap:10}}>
          <div>{f.id && <button onClick={()=>onDelete(f.id)} style={{...btnB,background:'#fdf0f0',color:C.red,border:`1px solid ${C.red}33`}}>Delete</button>}</div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>dlICS(f)} style={{...btnB,background:C.tag,color:C.accent,border:`1px solid ${C.accent}44`}}>⬇ Export .ics</button>
            <button onClick={()=>{if(!clash && validate()) onSave(f);}}
              style={{...btnB,background:clash?C.faint:C.accent,color:clash?C.muted:'#fff',
              cursor:clash?'not-allowed':'pointer'}}
              title={clash?`Slot taken by ${clash.organisation}`:''}>
              Save Booking
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [bookings,  setBookings]  = React.useState([]);
  const [loading,   setLoading]   = React.useState(true);
  const [dbError,   setDbError]   = React.useState(false);
  const [modal,     setModal]     = React.useState(null);
  const [activePod, setActivePod] = React.useState(PODS[0]);
  const [activeDay, setActiveDay] = React.useState('Day One');
  const [search,    setSearch]    = React.useState('');
  const [view,      setView]      = React.useState('grid');
  const [toast,     setToast]     = React.useState(null);

  const fire = (msg, color=C.green) => { setToast({msg,color}); setTimeout(()=>setToast(null),2800); };

  // Load + realtime
  React.useEffect(() => {
    async function load() {
      setLoading(true);
      const {data,error} = await sb.from('bookings').select('*').order('created_at',{ascending:true});
      if (error) { console.error(error); setDbError(true); }
      else setBookings(data||[]);
      setLoading(false);
    }
    load();
    const ch = sb.channel('bookings-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'bookings'},()=>load())
      .subscribe();
    return ()=>sb.removeChannel(ch);
  }, []);

  const save = React.useCallback(async (f) => {
    // Double-booking guard — check in-memory first for instant feedback
    const clash = bookings.find(b =>
      b.pod === f.pod && b.day === f.day && b.time === f.time && b.id !== f.id
    );
    if (clash) {
      fire(`This slot is already booked by ${clash.organisation}`, C.red);
      return;
    }
    const p = {pod:f.pod,day:f.day,time:f.time,staff:f.staff,organisation:f.organisation,
      representatives:f.representatives,challenge:f.challenge,solution:f.solution,
      technology:f.technology,crm_link:f.crm_link,calendar_invite:f.calendar_invite};
    const {error} = f.id
      ? await sb.from('bookings').update(p).eq('id',f.id)
      : await sb.from('bookings').insert(p);
    if (error) {
      if (error.code === '23505') { fire('That slot is already booked!', C.red); return; }
      fire('Save failed — check Supabase config', C.red); return;
    }
    setModal(null); fire('Booking saved ✓');
  },[bookings]);

  const del = React.useCallback(async (id) => {
    const {error} = await sb.from('bookings').delete().eq('id',id);
    if (error) { fire('Delete failed',C.red); return; }
    setModal(null); fire('Booking deleted',C.red);
  },[]);

  const gridMap = React.useMemo(()=>{
    const m={};
    bookings.filter(b=>b.pod===activePod&&b.day===activeDay).forEach(b=>{m[b.time]=b;});
    return m;
  },[bookings,activePod,activeDay]);

  const q = search.toLowerCase();
  const listAll = React.useMemo(()=>bookings.filter(b=>
    !q||b.organisation?.toLowerCase().includes(q)||b.staff?.toLowerCase().includes(q)||
    b.representatives?.toLowerCase().includes(q)||b.technology?.toLowerCase().includes(q)
  ),[bookings,q]);

  const podCount = React.useMemo(()=>{
    const m={}; PODS.forEach(p=>{m[p]={}; DAYS.forEach(d=>{m[p][d.label]=0;});});
    bookings.forEach(b=>{if(m[b.pod]&&b.day in m[b.pod]) m[b.pod][b.day]++;});
    return m;
  },[bookings]);

  const stats = {
    total:bookings.length,
    invited:bookings.filter(b=>b.calendar_invite).length,
    pending:bookings.filter(b=>!b.calendar_invite&&b.organisation).length,
    today:bookings.filter(b=>b.day===activeDay).length,
  };

  return (
    <div style={{minHeight:'100vh',background:C.bg,color:C.text,fontFamily:"'Barlow','Segoe UI',sans-serif"}}>

      {/* HEADER */}
      <div style={{background:'#005197',borderBottom:'1px solid #004080',padding:'14px 26px',
        display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:16,flexShrink:0}}>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 290" width="160" height="60" style={{display:'block'}}>

            </g></g></g>
            <g>
              <path className="cls-1" d="M154.84,157.07c-1.2-6.7-6.7-17.17-22.15-17.17-11.5,0-19.06,7.38-19.06,15.45,0,6.7,4.29,12.02,13.22,13.73l16.99,3.26c22.15,4.29,33.99,18.71,33.99,35.88,0,18.71-15.62,37.6-43.95,37.6-32.27,0-46.52-20.77-48.41-38.11l21.97-5.84c1.03,12.02,9.44,22.83,26.61,22.83,12.7,0,19.74-6.35,19.74-14.93,0-7.04-5.32-12.53-14.76-14.42l-17-3.43c-19.4-3.95-31.93-16.48-31.93-34.85,0-21.63,19.4-38.11,42.4-38.11,29.53,0,40.86,17.85,43.6,31.59l-21.29,6.52Z"/>
              <path className="cls-1" d="M181.62,121.54h27.81l27.29,48.24,27.3-48.24h26.61l-42.92,70.56v51.16h-23.69v-51.16l-42.4-70.56Z"/>
              <path className="cls-1" d="M404.97,121.54h-27.64l-26.61,42.06-26.09-42.06h-28.5l39.83,60.77-40,60.94h27.81l26.44-42.06,26.27,42.06h28.67l-40-60.77,39.83-60.94h0Z"/>
              <path className="cls-1" d="M469.87,118.96c-32.62,0-61.97,24.72-61.97,63.52s28.32,63.35,62.32,63.35,51.67-22.66,56.31-41.37l-22.15-6.7c-3.26,11.33-13.39,24.89-34.16,24.89-19.57,0-37.77-14.25-37.77-40.17,0-27.64,19.23-40.69,37.42-40.69,21.11,0,30.56,12.88,33.47,24.55l22.32-7.04c-4.81-19.74-22.15-40.34-55.79-40.34h0Z"/>
            </g>
          </svg>
          <div style={{width:1,height:36,background:'rgba(255,255,255,0.25)'}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.05em',fontSize:17,color:'#fff',textTransform:'uppercase'}}>
            Meeting Booking System
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.6)',marginTop:2,letterSpacing:'0.05em',textTransform:'uppercase'}}>
            {SHOW_NAME} · 6 pods · 3 days
            {loading && ' · syncing…'}
            {dbError && ' · ⚠ database not connected — see setup instructions'}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.3)',
            borderRadius:8,padding:'7px 12px',display:'flex',alignItems:'center',gap:8}}>
            <span style={{color:'rgba(255,255,255,0.6)',fontSize:13}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search org, staff, tech…"
              style={{background:'none',border:'none',color:'#fff',outline:'none',fontSize:13,width:180}}/>
          </div>
          <button onClick={()=>setView(v=>v==='grid'?'list':'grid')}
            style={{...btnB,background:'rgba(255,255,255,0.15)',color:'#fff',border:'1px solid rgba(255,255,255,0.3)'}}>
            {view==='grid'?'☰ List':'⊞ Grid'}
          </button>
          {view==='list' && (
            <button onClick={()=>dlAllICS(listAll)}
              style={{...btnB,background:'rgba(255,255,255,0.15)',color:'#fff',border:'1px solid rgba(255,255,255,0.3)'}}>
              ⬇ All .ics
            </button>
          )}
          <button onClick={()=>exportExcel(bookings)}
            style={{...btnB,background:'rgba(255,255,255,0.15)',color:'#fff',border:'1px solid rgba(255,255,255,0.3)'}}>
            ⬇ Excel
          </button>
          <button onClick={()=>setModal({...BLANK,pod:activePod,day:activeDay})}
            style={{...btnB,background:'#fff',color:'#005197',fontWeight:700}}>
            + New Booking
          </button>
        </div>
      </div>

      {/* STATS */}
      <div style={{display:'flex',background:C.surface,borderBottom:`1px solid ${C.border}`}}>
        {[
          {label:'Total Bookings',        val:stats.total,   icon:'📅'},
          {label:'Invites Sent',          val:stats.invited, icon:'📨', color:C.green},
          {label:'Invites Pending',       val:stats.pending, icon:'⏳', color:C.amber},
          {label:`${activeDay} Bookings`, val:stats.today,   icon:'📍'},
        ].map((s,i)=>(
          <div key={s.label} style={{flex:1,padding:'11px 20px',borderRight:i<3?`1px solid ${C.border}`:'none'}}>
            <div style={{fontSize:11,color:C.muted,textTransform:'uppercase',letterSpacing:'0.06em'}}>{s.icon} {s.label}</div>
            <div style={{fontSize:24,fontWeight:700,color:s.color||C.text,fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1.3,marginTop:1}}>{s.val}</div>
          </div>
        ))}
      </div>

      {/* DB ERROR */}
      {dbError && (
        <div style={{background:'#fff3cd',borderBottom:'1px solid #ffc107',padding:'12px 26px',fontSize:13,color:'#856404'}}>
          ⚠ <strong>Supabase not connected.</strong> Open this file in Notepad and replace <code>YOUR_PROJECT</code> and <code>YOUR_ANON_KEY</code> at the top of the file with your Supabase credentials.
        </div>
      )}

      {loading && <div style={{textAlign:'center',padding:'60px 0',color:C.muted,fontSize:14}}>Loading bookings…</div>}

      {!loading && (
        <div style={{padding:'20px 26px'}}>

          {/* GRID VIEW */}
          {view==='grid' && (
            <div>
              {/* Pod tabs */}
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
                {PODS.map(p=>{
                  const a=p===activePod, cnt=podCount[p]?.[activeDay]||0;
                  return (
                    <button key={p} onClick={()=>setActivePod(p)} style={{
                      ...btnB,background:a?'#005197':C.surface,color:a?'#fff':C.muted,
                      border:`1px solid ${a?C.accent:C.border2}`,display:'flex',alignItems:'center',gap:7,padding:'7px 14px',fontSize:12}}>
                      {p}
                      {cnt>0 && <span style={{background:a?'#fff':'#e0eaf4',color:a?'#005197':C.muted,borderRadius:10,padding:'0 7px',fontSize:11,fontWeight:700}}>{cnt}</span>}
                    </button>
                  );
                })}
              </div>
              {/* Day tabs */}
              <div style={{display:'flex',gap:6,marginBottom:18}}>
                {DAYS.map(d=>{
                  const a=d.label===activeDay;
                  return (
                    <button key={d.label} onClick={()=>setActiveDay(d.label)} style={{
                      ...btnB,background:a?C.accent:C.surface,color:a?'#fff':C.muted,border:`1px solid ${a?C.accent:C.border2}`,fontSize:12}}>
                      {d.label} <span style={{opacity:.65,fontWeight:400}}>· {d.date}</span>
                    </button>
                  );
                })}
              </div>
              {/* Table */}
              <div style={{overflowX:'auto',borderRadius:10,border:`1px solid ${C.border}`}}>
                <table style={{width:'100%',borderCollapse:'collapse',minWidth:900}}>
                  <thead>
                    <tr style={{background:C.surface}}>
                      {['Time','Staff','Organisation','Representatives','Challenge','Solution','Technology','CRM','Invite',''].map(h=>(
                        <th key={h} style={{padding:'9px 13px',textAlign:'left',fontSize:11,color:C.muted,
                          fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',
                          borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {TIME_SLOTS.map(slot=>{
                      if (slot===LUNCH_SLOT) return (
                        <tr key={slot} style={{background:'#fdf8f0',borderBottom:`1px solid ${C.border}`}}>
                          <td style={{padding:'9px 13px',color:C.amber,fontSize:12,fontWeight:600}}>{slot}</td>
                          <td colSpan={9} style={{padding:'9px 13px',color:C.amber,fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase'}}>🍽 Lunch Break</td>
                        </tr>
                      );
                      const b=gridMap[slot];
                      if (b) return (
                        <tr key={slot} className="rh" onClick={()=>setModal(b)}
                          style={{borderBottom:`1px solid ${C.border}`,background:'#f8fbff'}}>
                          <td style={{padding:'10px 13px',color:C.accent,fontWeight:700,fontSize:13,whiteSpace:'nowrap'}}>{slot}</td>
                          <td style={{padding:'10px 13px'}}>
                            <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                              {b.staff.split(/[\/,+&]/).map(s=>s.trim()).filter(Boolean).map(s=>(
                                <span key={s} style={{background:C.tag,color:C.accent,borderRadius:4,padding:'2px 6px',fontSize:10,whiteSpace:'nowrap'}}>{s}</span>
                              ))}
                            </div>
                          </td>
                          <td style={{padding:'10px 13px',fontWeight:700,color:C.text,fontSize:13,whiteSpace:'nowrap'}}>{b.organisation}</td>
                          <td style={{padding:'10px 13px',color:C.muted,fontSize:12,maxWidth:150}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.representatives||'–'}</div></td>
                          <td style={{padding:'10px 13px',color:C.muted,fontSize:12,maxWidth:160}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.challenge||'–'}</div></td>
                          <td style={{padding:'10px 13px',color:C.muted,fontSize:12,maxWidth:130}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.solution||'–'}</div></td>
                          <td style={{padding:'10px 13px',color:C.muted,fontSize:12,maxWidth:150}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.technology||'–'}</div></td>
                          <td style={{padding:'10px 13px'}}>
                            {b.crm_link ? <span style={{fontSize:11,padding:'2px 7px',borderRadius:4,background:C.tag,color:C.accent,border:`1px solid ${C.accent}33`}}>CRM</span>
                              : <span style={{color:C.faint,fontSize:11}}>–</span>}
                          </td>
                          <td style={{padding:'10px 13px'}}>
                            {b.calendar_invite
                              ? <span style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:'#e6f4ec',color:C.green,border:`1px solid ${C.green}33`}}>✓ Sent</span>
                              : <span style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:'#fef3e2',color:C.amber,border:`1px solid ${C.amber}33`}}>Pending</span>}
                          </td>
                          <td style={{padding:'10px 10px',textAlign:'right'}}>
                            <button onClick={e=>{e.stopPropagation();dlICS(b);}} style={{background:'none',border:`1px solid ${C.border2}`,borderRadius:5,color:C.muted,padding:'4px 9px',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>⬇ .ics</button>
                          </td>
                        </tr>
                      );
                      return (
                        <tr key={slot} className="eh" onClick={()=>setModal({...BLANK,pod:activePod,day:activeDay,time:slot})}
                          style={{borderBottom:`1px solid ${C.border}`,transition:'background .1s'}}>
                          <td style={{padding:'10px 13px',color:C.faint,fontWeight:700,fontSize:13}}>{slot}</td>
                          <td colSpan={9} style={{padding:'10px 13px',color:'#aac4dc',fontSize:12,fontStyle:'italic'}}>— available · click to book</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* LIST VIEW */}
          {view==='list' && (
            <div>
              {search && <div style={{marginBottom:10,color:C.muted,fontSize:13}}>{listAll.length} result{listAll.length!==1?'s':''} for "{search}"</div>}
              {DAYS.map(day=>{
                const items=listAll.filter(b=>b.day===day.label&&b.organisation).sort((a,b)=>a.pod.localeCompare(b.pod)||a.time.localeCompare(b.time));
                if(!items.length) return null;
                return (
                  <div key={day.label} style={{marginBottom:26}}>
                    <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:'0.09em',textTransform:'uppercase',marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>
                      {day.label} — {day.date}
                    </div>
                    {items.map(b=>(
                      <div key={b.id} className="rh" onClick={()=>setModal(b)}
                        style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 16px',marginBottom:5,display:'flex',alignItems:'flex-start',gap:14,transition:'background .1s'}}>
                        <div style={{minWidth:90,paddingTop:1}}>
                          <div style={{color:C.accent,fontWeight:700,fontSize:13}}>{b.time}</div>
                          <div style={{fontSize:10,color:C.muted,marginTop:2}}>{b.pod}</div>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:700,color:C.text,fontSize:14}}>{b.organisation}</div>
                          {b.representatives && <div style={{fontSize:12,color:C.muted,marginTop:1}}>{b.representatives}</div>}
                          {b.challenge && <div style={{fontSize:11,color:C.muted,marginTop:3,fontStyle:'italic'}}>↳ {b.challenge}</div>}
                        </div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:3,maxWidth:200,justifyContent:'flex-end'}}>
                          {b.staff.split(/[\/,+&]/).map(s=>s.trim()).filter(Boolean).slice(0,5).map(s=>(
                            <span key={s} style={{background:C.tag,color:C.accent,borderRadius:4,padding:'2px 6px',fontSize:11}}>{s}</span>
                          ))}
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:5,alignItems:'flex-end',minWidth:90}}>
                          {b.calendar_invite
                            ? <span style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:'#e6f4ec',color:C.green,border:`1px solid ${C.green}33`}}>✓ Sent</span>
                            : <span style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:'#fef3e2',color:C.amber,border:`1px solid ${C.amber}33`}}>Pending</span>}
                          <button onClick={e=>{e.stopPropagation();dlICS(b);}} style={{background:'none',border:`1px solid ${C.border2}`,borderRadius:5,color:C.muted,padding:'4px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>⬇ .ics</button>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
              {!listAll.filter(b=>b.organisation).length && (
                <div style={{textAlign:'center',color:C.muted,padding:'60px 0',fontSize:14}}>
                  No bookings yet. Click <strong style={{color:C.accent}}>+ New Booking</strong> to get started.
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {modal && <Modal init={modal} onClose={()=>setModal(null)} onSave={save} onDelete={del} bookings={bookings}/>}

      {toast && (
        <div style={{position:'fixed',bottom:22,right:22,zIndex:2000,background:'#fff',
          border:`1px solid ${toast.color}44`,borderLeft:`3px solid ${toast.color}`,
          color:toast.color,padding:'11px 18px',borderRadius:8,fontSize:13,fontWeight:600,
          boxShadow:'0 8px 28px rgba(0,0,0,.15)',animation:'fu .2s ease'}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
